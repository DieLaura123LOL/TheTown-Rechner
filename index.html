<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>RP Verkaufsrechner</title>

<style>
body {
  background: #0d0d0d;
  color: white;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.container {
  background: #1a1a1a;
  padding: 30px;
  border-radius: 15px;
  width: 320px;
  box-shadow: 0 0 20px rgba(255,255,255,0.1);
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

.item {
  display: flex;
  justify-content: space-between;
  margin: 10px 0;
  align-items: center;
}

label {
  font-size: 14px;
}

input {
  width: 70px;
  padding: 6px;
  border-radius: 5px;
  border: none;
  text-align: center;
  font-size: 14px;
}

input:focus {
  outline: none;
  box-shadow: 0 0 5px white;
}

hr {
  margin: 20px 0;
  border: 0.5px solid #444;
}

.result {
  margin-top: 10px;
  font-size: 18px;
  text-align: center;
}

.total {
  font-size: 20px;
  font-weight: bold;
}

.discount {
  color: #bbbbbb;
}
</style>
</head>

<body>

<div class="container">
  <h1>RP Rechner</h1>

  <div class="item">
    <label>Wagyu Steak (250$)</label>
    <input type="number" id="wagyu" value="0" oninput="berechnen()">
  </div>

  <div class="item">
    <label>Zitronenwasser (50$)</label>
    <input type="number" id="wasser" value="0" oninput="berechnen()">
  </div>

  <div class="item">
    <label>Rotwein (100$)</label>
    <input type="number" id="wein" value="0" oninput="berechnen()">
  </div>

  <div class="item">
    <label>Panna Cotta (75$)</label>
    <input type="number" id="panna" value="0" oninput="berechnen()">
  </div>

  <hr>

  <div class="item">
    <label>Rabatt (%)</label>
    <input type="number" id="rabatt" value="0" oninput="berechnen()">
  </div>

  <div class="result" id="gesamt">Gesamt: 0$</div>
  <div class="result total" id="endpreis">Endpreis: 0$</div>
</div>

<script>
function berechnen() {
  let wagyu = document.getElementById("wagyu").value * 250;
  let wasser = document.getElementById("wasser").value * 50;
  let wein = document.getElementById("wein").value * 100;
  let panna = document.getElementById("panna").value * 75;

  let gesamt = wagyu + wasser + wein + panna;

  let rabatt = document.getElementById("rabatt").value;
  let endpreis = gesamt - (gesamt * rabatt / 100);

  document.getElementById("gesamt").innerText = "Gesamt: " + gesamt + "$";
  document.getElementById("endpreis").innerText = "Endpreis: " + endpreis.toFixed(2) + "$";
}
</script>

</body>
</html>
