<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>RP Verkaufsrechner</title>

<style>
body {
  background: #0d0d0d;
  color: white;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.container {
  background: #1a1a1a;
  padding: 30px;
  border-radius: 15px;
  width: 360px;
  box-shadow: 0 0 20px rgba(255,255,255,0.08);
}

h1 {
  text-align: center;
  margin-bottom: 20px;
  font-size: 26px;
}

.item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 12px 0;
  font-size: 16px;
}

label {
  flex: 1;
}

.controls {
  display: flex;
  align-items: center;
  gap: 5px;
}

button {
  background: #333;
  color: white;
  border: none;
  width: 30px;
  height: 30px;
  border-radius: 6px;
  font-size: 18px;
  cursor: pointer;
}

button:hover {
  background: #555;
}

.value {
  width: 40px;
  text-align: center;
  font-size: 16px;
}

hr {
  margin: 20px 0;
  border: 0.5px solid #444;
}

.result {
  text-align: center;
  font-size: 20px;
  margin-top: 10px;
}

.total {
  font-size: 22px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
  <h1>RP Rechner</h1>

  <div class="item">
    <label>Wagyu Steak (250$)</label>
    <div class="controls">
      <button onclick="change('wagyu', -1)">-</button>
      <div class="value" id="wagyuVal">0</div>
      <button onclick="change('wagyu', 1)">+</button>
    </div>
  </div>

  <div class="item">
    <label>Zitronenwasser (50$)</label>
    <div class="controls">
      <button onclick="change('wasser', -1)">-</button>
      <div class="value" id="wasserVal">0</div>
      <button onclick="change('wasser', 1)">+</button>
    </div>
  </div>

  <div class="item">
    <label>Rotwein (100$)</label>
    <div class="controls">
      <button onclick="change('wein', -1)">-</button>
      <div class="value" id="weinVal">0</div>
      <button onclick="change('wein', 1)">+</button>
    </div>
  </div>

  <div class="item">
    <label>Panna Cotta (75$)</label>
    <div class="controls">
      <button onclick="change('panna', -1)">-</button>
      <div class="value" id="pannaVal">0</div>
      <button onclick="change('panna', 1)">+</button>
    </div>
  </div>

  <hr>

  <div class="item">
    <label>Rabatt (%)</label>
    <div class="controls">
      <button onclick="change('rabatt', -5)">-</button>
      <div class="value" id="rabattVal">0</div>
      <button onclick="change('rabatt', 5)">+</button>
    </div>
  </div>

  <div class="result" id="gesamt">Gesamt: 0$</div>
  <div class="result total" id="endpreis">Endpreis: 0$</div>
</div>

<script>
let values = {
  wagyu: 0,
  wasser: 0,
  wein: 0,
  panna: 0,
  rabatt: 0
};

function change(item, amount) {
  values[item] += amount;

  if (values[item] < 0) values[item] = 0;
  if (item === "rabatt" && values[item] > 100) values[item] = 100;

  document.getElementById(item + "Val").innerText = values[item];
  berechnen();
}

function berechnen() {
  let gesamt =
    values.wagyu * 250 +
    values.wasser * 50 +
    values.wein * 100 +
    values.panna * 75;

  let endpreis = gesamt - (gesamt * values.rabatt / 100);

  document.getElementById("gesamt").innerText = "Gesamt: " + gesamt + "$";
  document.getElementById("endpreis").innerText = "Endpreis: " + endpreis.toFixed(2) + "$";
}
</script>

</body>
</html>
