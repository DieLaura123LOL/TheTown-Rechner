<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>RP Verkaufsrechner</title>

<style>
body {
  background: #0d0d0d;
  color: white;
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 20px;
}

/* GRID FIX */
.wrapper {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}

/* Für kleinere Bildschirme */
@media (max-width: 900px) {
  .wrapper {
    grid-template-columns: 1fr;
  }
}

.container {
  background: #1a1a1a;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 0 15px rgba(255,255,255,0.08);
}

h2 {
  text-align: center;
}

.item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 10px 0;
}

.controls {
  display: flex;
  gap: 5px;
}

button {
  width: 28px;
  height: 28px;
  border: none;
  border-radius: 6px;
  background: #333;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #555;
}

.value {
  width: 35px;
  text-align: center;
}

.result {
  text-align: center;
  margin-top: 10px;
  font-size: 18px;
}

.total {
  font-weight: bold;
  font-size: 20px;
}

hr {
  border: 0.5px solid #444;
  margin: 15px 0;
}
</style>
</head>

<body>

<div class="wrapper" id="app"></div>

<script>
// HTML für einen Rechner
function createCalculator(id) {
  return `
  <div class="container">
    <h2>Kunde ${id}</h2>

    ${item("Wagyu Steak (250$)", "wagyu", id)}
    ${item("Zitronenwasser (50$)", "wasser", id)}
    ${item("Rotwein (100$)", "wein", id)}
    ${item("Panna Cotta (75$)", "panna", id)}

    <hr>

    ${item("Rabatt (%)", "rabatt", id, 5)}

    <div class="result" id="gesamt-${id}">Gesamt: 0$</div>
    <div class="result total" id="endpreis-${id}">Endpreis: 0$</div>
  </div>
  `;
}

function item(label, name, id, step = 1) {
  return `
  <div class="item">
    <span>${label}</span>
    <div class="controls">
      <button onclick="change('${name}-${id}', -${step})">-</button>
      <div class="value" id="${name}-${id}">0</div>
      <button onclick="change('${name}-${id}', ${step})">+</button>
    </div>
  </div>
  `;
}

// 3 Rechner einfügen
document.getElementById("app").innerHTML =
  createCalculator(1) +
  createCalculator(2) +
  createCalculator(3);

// Werte speichern
let values = {};

function change(id, amount) {
  if (!values[id]) values[id] = 0;

  values[id] += amount;
  if (values[id] < 0) values[id] = 0;

  if (id.includes("rabatt") && values[id] > 100) values[id] = 100;

  document.getElementById(id).innerText = values[id];
  berechnen();
}

function berechnen() {
  for (let i = 1; i <= 3; i++) {
    let wagyu = values["wagyu-" + i] || 0;
    let wasser = values["wasser-" + i] || 0;
    let wein = values["wein-" + i] || 0;
    let panna = values["panna-" + i] || 0;
    let rabatt = values["rabatt-" + i] || 0;

    let gesamt =
      wagyu * 250 +
      wasser * 50 +
      wein * 100 +
      panna * 75;

    let endpreis = gesamt - (gesamt * rabatt / 100);

    document.getElementById("gesamt-" + i).innerText =
      "Gesamt: " + gesamt + "$";

    document.getElementById("endpreis-" + i).innerText =
      "Endpreis: " + endpreis.toFixed(2) + "$";
  }
}
</script>

</body>
</html>
