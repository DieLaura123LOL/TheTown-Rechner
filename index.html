<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>RP Food Rechner</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #0d0d0d;
  color: white;
  font-family: Arial, sans-serif;
}

.wrapper {
  display: grid;
  grid-template-columns: repeat(3, 320px);
  gap: 20px;
}

.container {
  background: #1a1a1a;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 0 15px rgba(255,255,255,0.08);
  max-height: 90vh;
  overflow-y: auto;
}

h2 {
  text-align: center;
}

.item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 6px 0;
  font-size: 14px;
}

.controls {
  display: flex;
  gap: 5px;
}

button {
  width: 26px;
  height: 26px;
  border: none;
  border-radius: 6px;
  background: #333;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #555;
}

.value {
  width: 30px;
  text-align: center;
}

.result {
  text-align: center;
  margin-top: 10px;
}

.total {
  font-weight: bold;
  font-size: 18px;
}

hr {
  border: 0.5px solid #444;
  margin: 10px 0;
}
</style>
</head>

<body>

<div class="wrapper" id="app"></div>

<script>
// NEUE PREISE
const products = [
  ["Wagyu Steak", 300],
  ["Peking Ente", 250],
  ["Ramen", 250],
  ["Jakobsmuscheln", 200],
  ["Gyoza", 200],
  ["Sellerie-Apfel Suppe", 200],
  ["Miso Suppe", 175],
  ["Kohlrabi-Flusskrebs", 175],
  ["Sommerrolle", 150],
  ["Frühlingsrolle", 150],
  ["Mochi", 150],
  ["Gebackene Bannane", 150],
  ["Matcha Eiscreme", 150],
  ["Hotteok", 150],
  ["Soju Caipirinha", 125],
  ["Rotwein", 100],
  ["Ginjo Sake", 100],
  ["Red Lantern", 100],
  ["Tofu Nut", 80],
  ["Mai Tai", 80],
  ["Bubble Tea", 100],
  ["Zitronenwasser", 75],
  ["Winter Sun", 75],
  ["Jasmintee", 75]
];

function createCalculator(id) {
  let html = `<div class="container"><h2>Kunde ${id}</h2>`;

  products.forEach((p, i) => {
    html += `
    <div class="item">
      <span>${p[0]} (${p[1]}$)</span>
      <div class="controls">
        <button onclick="change('${id}-${i}', -1)">-</button>
        <div class="value" id="${id}-${i}">0</div>
        <button onclick="change('${id}-${i}', 1)">+</button>
      </div>
    </div>`;
  });

  html += `
  <hr>
  <div class="item">
    <span>Rabatt (%)</span>
    <div class="controls">
      <button onclick="change('rabatt-${id}', -5)">-</button>
      <div class="value" id="rabatt-${id}">0</div>
      <button onclick="change('rabatt-${id}', 5)">+</button>
    </div>
  </div>

  <div class="result" id="gesamt-${id}">Gesamt: 0$</div>
  <div class="result total" id="endpreis-${id}">Endpreis: 0$</div>

  </div>`;

  return html;
}

document.getElementById("app").innerHTML =
  createCalculator(1) +
  createCalculator(2) +
  createCalculator(3);

let values = {};

function change(id, amount) {
  if (!values[id]) values[id] = 0;

  values[id] += amount;
  if (values[id] < 0) values[id] = 0;

  if (id.includes("rabatt") && values[id] > 100) values[id] = 100;

  document.getElementById(id).innerText = values[id];
  berechnen();
}

function berechnen() {
  for (let k = 1; k <= 3; k++) {
    let gesamt = 0;

    products.forEach((p, i) => {
      let val = values[`${k}-${i}`] || 0;
      gesamt += val * p[1];
    });

    let rabatt = values[`rabatt-${k}`] || 0;
    let endpreis = gesamt - (gesamt * rabatt / 100);

    document.getElementById(`gesamt-${k}`).innerText =
      "Gesamt: " + gesamt.toLocaleString() + "$";

    document.getElementById(`endpreis-${k}`).innerText =
      "Endpreis: " + endpreis.toLocaleString() + "$";
  }
}
</script>

</body>
</html>
